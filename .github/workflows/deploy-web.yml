name: Deploy web

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-web.yml"
      - "terraform/environments/dev/db_migrate_job.tf"
      - "terraform/environments/dev/connectivity.tf"
  workflow_dispatch:
    inputs:
      run_migrations:
        description: Run pending DB migrations before deploy
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: mogu-501309
  REGION: asia-northeast1
  SERVICE: dev-web
  IMAGE: asia-northeast1-docker.pkg.dev/mogu-501309/web/web
  MIGRATE_IMAGE: asia-northeast1-docker.pkg.dev/mogu-501309/web/migrate
  MIGRATE_JOB: dev-db-migrate
  # From: terraform output github_actions_workload_identity_provider
  WORKLOAD_IDENTITY_PROVIDER: projects/391728250072/locations/global/workloadIdentityPools/dev-github/providers/github
  # From: terraform output github_actions_service_account
  SERVICE_ACCOUNT: dev-github-actions@mogu-501309.iam.gserviceaccount.com

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        name: Detect Prisma migration changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.run_migrations }}" = "true" ]; then
              echo "migrations=true" >> "${GITHUB_OUTPUT}"
            else
              echo "migrations=false" >> "${GITHUB_OUTPUT}"
            fi
            exit 0
          fi

          before="${{ github.event.before }}"
          if [ -z "${before}" ] || [ "${before}" = "0000000000000000000000000000000000000000" ]; then
            changed="$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}")"
          else
            changed="$(git diff --name-only "${before}" "${{ github.sha }}")"
          fi
          echo "${changed}"
          if echo "${changed}" | grep -q '^apps/web/prisma/migrations/'; then
            echo "migrations=true" >> "${GITHUB_OUTPUT}"
          else
            echo "migrations=false" >> "${GITHUB_OUTPUT}"
          fi

  migrate:
    needs: detect
    if: needs.detect.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}
          token_format: access_token

      - uses: google-github-actions/setup-gcloud@v2

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push migrate image
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          file: apps/web/Dockerfile.migrate
          push: true
          tags: |
            ${{ env.MIGRATE_IMAGE }}:${{ github.sha }}
            ${{ env.MIGRATE_IMAGE }}:latest
          platforms: linux/amd64

      - name: Update migrate job image
        run: |
          gcloud run jobs update "${MIGRATE_JOB}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${MIGRATE_IMAGE}:${GITHUB_SHA}"

      - name: Apply pending migrations
        run: |
          gcloud run jobs execute "${MIGRATE_JOB}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --wait

  deploy:
    needs: [detect, migrate]
    if: |
      always() &&
      needs.detect.result == 'success' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}
          token_format: access_token

      - uses: google-github-actions/setup-gcloud@v2

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update "${SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${IMAGE}:${GITHUB_SHA}"
