name: Deploy web

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-web.yml"

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: mogu-501309
  REGION: asia-northeast1
  SERVICE: dev-web
  IMAGE: asia-northeast1-docker.pkg.dev/mogu-501309/web/web
  # From: terraform output github_actions_workload_identity_provider
  WORKLOAD_IDENTITY_PROVIDER: projects/391728250072/locations/global/workloadIdentityPools/dev-github/providers/github
  # From: terraform output github_actions_service_account
  SERVICE_ACCOUNT: dev-github-actions@mogu-501309.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.auth_token }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          platforms: linux/amd64

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update "${SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${IMAGE}:${GITHUB_SHA}"
