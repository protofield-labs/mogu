name: Web check

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "scripts/verify-*.sh"
      - "scripts/ci-setup-test-db.sh"
      - ".github/workflows/web-check.yml"

permissions:
  contents: read

jobs:
  web-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://app_user:ci@localhost:5432/app
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Verify auth error model
        run: pnpm exec tsx scripts/verify-auth-errors.ts

      - name: Verify agent engine config
        run: pnpm exec tsx scripts/verify-agent-config.ts

      - name: Verify agent message helpers
        run: pnpm exec tsx scripts/verify-agent-message.ts

      - name: Build
        run: pnpm build

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Prepare test database
        working-directory: ${{ github.workspace }}
        run: bash scripts/ci-setup-test-db.sh

      - name: Apply migrations
        run: pnpm db:migrate

      - name: Verify guardrails
        working-directory: ${{ github.workspace }}
        run: bash scripts/verify-guardrails.sh
