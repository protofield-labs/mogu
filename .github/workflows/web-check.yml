name: Web check

# Always trigger so `web-check` can be a required status check.
# Path filtering happens in the `web-changes` job: when nothing relevant
# changed, `web-check` is skipped via `if:` and reports Success.
on:
  pull_request:

permissions:
  contents: read

jobs:
  web-changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        name: Detect web-related changes
        run: |
          changed="$(git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD")"
          echo "${changed}"
          if echo "${changed}" | grep -qE '^(apps/web/|scripts/verify-[^/]*\.sh$|scripts/ci-setup-test-db\.sh$|\.github/workflows/web-check\.yml$)'; then
            echo "web=true" >> "${GITHUB_OUTPUT}"
          else
            echo "web=false" >> "${GITHUB_OUTPUT}"
          fi

  web-check:
    needs: web-changes
    if: needs.web-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://app_user:ci@localhost:5432/app
      PGPASSWORD: postgres
      # Reproduce deploy-time prerender (#211): isFirebaseConfigured() true → AuthGate loading path.
      NEXT_PUBLIC_FIREBASE_API_KEY: dummy-api-key
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: localhost
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-mogu
      NEXT_PUBLIC_FIREBASE_APP_ID: 1:demo-mogu:web:local
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: UI verification
        run: pnpm exec tsx scripts/run-verify-ui.ts

      - name: Production-like build
        run: pnpm build

      - name: Install PostgreSQL client
        run: |
          # Pre-installed Microsoft/Azure apt sources on ubuntu-latest can break
          # apt-get update; disable them before installing postgresql-client.
          for repo in /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure*; do
            if [ -f "${repo}" ]; then
              sudo mv "${repo}" "${repo}.disabled"
            fi
          done
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Prepare test database
        working-directory: ${{ github.workspace }}
        run: bash scripts/ci-setup-test-db.sh

      - name: Apply migrations
        run: pnpm db:migrate

      - name: Verify friendship pair ordering
        run: pnpm exec tsx scripts/verify-friendship-pair.ts

      - name: Seed demo data
        run: pnpm db:seed

      - name: Verify demo seed
        run: pnpm exec tsx scripts/verify-demo-seed.ts

      - name: Verify guardrails
        working-directory: ${{ github.workspace }}
        run: bash scripts/verify-guardrails.sh
